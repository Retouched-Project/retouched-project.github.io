name: Deploy Site + Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build -d _mkdocs_out

      - name: Assemble full site
        run: |
          mkdir -p _site
          # Copy the static landing page files
          cp index.html _site/
          cp style.css _site/
          cp script.js _site/
          cp -r assets _site/
          [ -f LICENSE ] && cp LICENSE _site/
          # Copy the built MkDocs docs into /docs/
          cp -r _mkdocs_out _site/docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
